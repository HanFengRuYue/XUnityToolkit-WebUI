# Reusable build workflow — called by release.yml and dep-check.yml
# Can also be triggered manually via workflow_dispatch for testing.
#
# Optimizations over naive sequential build:
#   - NuGet package cache (actions/cache)
#   - npm ci runs in parallel with bundled asset downloads + dotnet restore
#   - Frontend build and TranslatorEndpoint build run in parallel; Updater AOT runs as a separate step
#   - Main release ZIP created in parallel with component ZIPs
#   - Component ZIPs use direct entry creation (no temp directory copies)
name: Build

on:
  workflow_call:
    inputs:
      build_version:
        description: 'Version string (e.g. 1.9.202603130200); auto-generated if empty'
        required: false
        type: string
      release_tag:
        description: 'Git tag for the GitHub Release'
        required: true
        type: string
      release_name:
        description: 'Human-readable release title'
        required: true
        type: string
      release_body:
        description: 'Release notes markdown'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      build_version:
        description: 'Version override (default: auto-generated timestamp)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version_prefix: ${{ steps.ver.outputs.version_prefix }}
      build_version: ${{ steps.ver.outputs.build_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ inputs.build_version }}'
          if (-not $v) { $v = "4.3.$(Get-Date -Format 'yyyyMMddHHmm')" }
          $prefix = $v.Split('.')[0..1] -join '.'
          "build_version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version_prefix=$prefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Build version: $v (prefix: $prefix)"

      # ── SDK setup ──

      - name: Setup .NET 10 preview
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: XUnityToolkit-Vue/package-lock.json

      # ── Caching ──

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      # ── Parallel: npm ci + dotnet restore + download bundled assets ──
      # npm ci (longest, ~54s) runs in background while dotnet restore and
      # asset downloads proceed in the foreground (~32s combined).

      - name: Download bundled assets & install dependencies
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Start npm ci in background (independent of everything else)
          $npmCiJob = Start-Job -ScriptBlock {
              param($workDir)
              Set-Location $workDir
              & npm ci 2>&1
              if ($LASTEXITCODE -ne 0) { throw "npm ci failed with exit code $LASTEXITCODE" }
          } -ArgumentList (Resolve-Path "XUnityToolkit-Vue").Path

          # ── Restore .NET projects (populates NuGet cache) ──
          Write-Host "Restoring .NET projects..."
          dotnet restore XUnityToolkit-WebUI/XUnityToolkit-WebUI.csproj -r win-x64 -v quiet
          dotnet restore Updater/Updater.csproj -r win-x64 -v quiet
          dotnet restore TranslatorEndpoint/TranslatorEndpoint.csproj -v quiet
          Write-Host ".NET restore complete."

          # ── Download bundled assets ──
          $headers = @{
            'Authorization' = "Bearer $env:GH_TOKEN"
            'User-Agent'    = 'XUnityToolkit-CI/1.0'
          }

          function Invoke-WithRetry {
            param(
              [scriptblock]$ScriptBlock,
              [int]$MaxRetries = 3,
              [string]$Operation = "Operation"
            )
            $attempt = 0
            while ($true) {
              try {
                $attempt++
                return (& $ScriptBlock)
              } catch {
                if ($attempt -ge $MaxRetries) {
                  throw "${Operation}: failed after $MaxRetries attempts. Last error: $($_.Exception.Message)"
                }
                $waitSec = [math]::Pow(2, $attempt)
                Write-Host "  [retry] $Operation failed (attempt $attempt/$MaxRetries), retrying in ${waitSec}s..."
                Write-Host "          $($_.Exception.Message)"
                Start-Sleep -Seconds $waitSec
              }
            }
          }

          function Download-Asset {
            param([string]$Url, [string]$DestDir, [string]$FileName = $null)
            if (-not $FileName) {
              $FileName = [System.Uri]::UnescapeDataString(($Url -split '/')[-1])
            }
            $destPath = Join-Path $DestDir $FileName
            if (Test-Path $destPath) {
              Write-Host "  [cached] $FileName"
              return
            }
            $tmpPath = "$destPath.downloading"
            if (Test-Path $tmpPath) { Remove-Item $tmpPath -Force }
            Write-Host "  Downloading $FileName..."
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WithRetry -Operation "Download $FileName" -ScriptBlock {
              Invoke-WebRequest -Uri $Url -OutFile $tmpPath -UseBasicParsing -TimeoutSec 600
            }.GetNewClosure()
            Move-Item $tmpPath $destPath -Force
          }

          $BundledRoot = "bundled"
          foreach ($d in @(
            "$BundledRoot\bepinex5",
            "$BundledRoot\bepinex6",
            "$BundledRoot\xunity",
            "$BundledRoot\llama"
          )) {
            New-Item -ItemType Directory -Path $d -Force | Out-Null
          }

          # ── BepInEx 5 (Mono) ──
          Write-Host "Fetching BepInEx 5..."
          $b5releases = Invoke-WithRetry -Operation "Fetch BepInEx 5 releases" -ScriptBlock {
            Invoke-RestMethod -Uri "https://api.github.com/repos/BepInEx/BepInEx/releases?per_page=20" -Headers $headers -TimeoutSec 30
          }.GetNewClosure()
          $b5rel = $b5releases |
            Where-Object { -not $_.prerelease -and $_.tag_name -like 'v5*' } |
            Select-Object -First 1
          if (-not $b5rel) { throw "BepInEx 5 release not found" }
          Write-Host "  BepInEx 5: $($b5rel.tag_name)"
          foreach ($arch in @('x64', 'x86')) {
            $asset = $b5rel.assets |
              Where-Object { $_.name -like "BepInEx_win_${arch}_*" } |
              Select-Object -First 1
            if ($asset) {
              Download-Asset -Url $asset.browser_download_url -DestDir "$BundledRoot\bepinex5"
            }
          }

          # ── BepInEx 6 BE (IL2CPP) ──
          Write-Host "Fetching BepInEx 6 BE..."
          $buildsHtml = (Invoke-WithRetry -Operation "Fetch BepInEx 6 BE page" -ScriptBlock {
            Invoke-WebRequest -Uri "https://builds.bepinex.dev/projects/bepinex_be" -UseBasicParsing -TimeoutSec 60
          }).Content
          if ($buildsHtml -match 'href="[^"]*?/(\d+)/BepInEx-Unity\.IL2CPP-win-x64-6\.0\.0-be\.\d+%2B([a-f0-9]+)\.zip"') {
            $buildNo = $Matches[1]
            $commit  = $Matches[2]
            Write-Host "  BepInEx 6 BE: build $buildNo ($commit)"
            foreach ($arch in @('x64', 'x86')) {
              $url  = "https://builds.bepinex.dev/projects/bepinex_be/$buildNo/BepInEx-Unity.IL2CPP-win-$arch-6.0.0-be.$buildNo%2B$commit.zip"
              $name = "BepInEx-Unity.IL2CPP-win-$arch-6.0.0-be.$buildNo+$commit.zip"
              Download-Asset -Url $url -DestDir "$BundledRoot\bepinex6" -FileName $name
            }
          } else {
            throw "Failed to parse BepInEx 6 BE build info"
          }

          # ── XUnity.AutoTranslator ──
          Write-Host "Fetching XUnity.AutoTranslator..."
          $xureleases = Invoke-WithRetry -Operation "Fetch XUnity releases" -ScriptBlock {
            Invoke-RestMethod -Uri "https://api.github.com/repos/bbepis/XUnity.AutoTranslator/releases?per_page=5" -Headers $headers -TimeoutSec 30
          }.GetNewClosure()
          $xurel = $xureleases | Select-Object -First 1
          if (-not $xurel) { throw "XUnity release not found" }
          Write-Host "  XUnity: $($xurel.tag_name)"
          foreach ($asset in ($xurel.assets | Where-Object { $_.name -like 'XUnity.AutoTranslator-BepInEx*' })) {
            Download-Asset -Url $asset.browser_download_url -DestDir "$BundledRoot\xunity"
          }

          # ── llama.cpp (pinned version) ──
          $llamaTag = "b8580"
          Write-Host "Fetching llama.cpp $llamaTag..."
          $llamarel = Invoke-WithRetry -Operation "Fetch llama.cpp $llamaTag" -ScriptBlock {
            Invoke-RestMethod -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/tags/$llamaTag" -Headers $headers -TimeoutSec 30
          }.GetNewClosure()
          Write-Host "  llama.cpp: $($llamarel.tag_name)"
          $llamaPatterns = @(
            "llama-*-bin-win-cuda-13.1-x64.zip",
            "cudart-llama-bin-win-cuda-13.1-x64.zip",
            "llama-*-bin-win-vulkan-x64.zip",
            "llama-*-bin-win-cpu-x64.zip"
          )
          foreach ($pattern in $llamaPatterns) {
            $asset = $llamarel.assets |
              Where-Object { $_.name -like $pattern } |
              Select-Object -First 1
            if ($asset) {
              Download-Asset -Url $asset.browser_download_url -DestDir "$BundledRoot\llama"
            } else {
              Write-Host "  [skip] $pattern not found"
            }
          }
          # Write version marker for runtime version detection
          Set-Content -Path "$BundledRoot\llama\version.txt" -Value $llamaTag -NoNewline

          # ── Extract XUnity reference DLLs for TranslatorEndpoint ──
          $xunityZip = Get-ChildItem -Path "$BundledRoot\xunity" -Filter '*.zip' |
              Where-Object { $_.Name -notlike '*IL2CPP*' } |
              Select-Object -First 1
          if ($xunityZip) {
              Write-Host "Extracting XUnity reference DLLs..."
              $libsDir = "TranslatorEndpoint\libs"
              if (-not (Test-Path $libsDir)) { New-Item -ItemType Directory -Path $libsDir -Force | Out-Null }
              try {
                  Add-Type -AssemblyName System.IO.Compression.FileSystem
                  $zip = [System.IO.Compression.ZipFile]::OpenRead($xunityZip.FullName)
                  try {
                      $dllMappings = @(
                          @{ Entry = 'BepInEx/plugins/XUnity.AutoTranslator/XUnity.AutoTranslator.Plugin.Core.dll'; Target = 'XUnity.AutoTranslator.Plugin.Core.dll' },
                          @{ Entry = 'BepInEx/core/XUnity.Common.dll'; Target = 'XUnity.Common.dll' }
                      )
                      foreach ($mapping in $dllMappings) {
                          $entry = $zip.GetEntry($mapping.Entry)
                          if (-not $entry) {
                              Write-Host "  [warn] Entry '$($mapping.Entry)' not found in ZIP"
                              continue
                          }
                          $targetPath = Join-Path $libsDir $mapping.Target
                          $entryStream = $entry.Open()
                          $memStream = New-Object System.IO.MemoryStream
                          try {
                              $entryStream.CopyTo($memStream)
                              $newBytes = $memStream.ToArray()
                              $sha256 = [System.Security.Cryptography.SHA256]::Create()
                              try {
                                  $newHash = [BitConverter]::ToString($sha256.ComputeHash($newBytes)).Replace('-','')
                              } finally {
                                  $sha256.Dispose()
                              }
                          } finally {
                              $entryStream.Dispose()
                              $memStream.Dispose()
                          }
                          $changed = $true
                          if (Test-Path $targetPath) {
                              $oldHash = (Get-FileHash -Path $targetPath -Algorithm SHA256).Hash
                              if ($oldHash -eq $newHash) { $changed = $false }
                          }
                          if ($changed) {
                              [System.IO.File]::WriteAllBytes($targetPath, $newBytes)
                              Write-Host "  [updated] $($mapping.Target)"
                          } else {
                              Write-Host "  [unchanged] $($mapping.Target)"
                          }
                      }
                  } finally {
                      $zip.Dispose()
                  }
              } catch {
                  Write-Host "::warning::Failed to extract XUnity DLLs: $($_.Exception.Message)"
                  Write-Host "  Using committed DLLs as fallback."
              }
          } else {
              Write-Host "  [skip] XUnity ZIP not found, using committed DLLs"
          }

          # ── Update classdata.tpk from AssetRipper/Tpk CI ──
          if (Get-Command gh -ErrorAction SilentlyContinue) {
              Write-Host "Fetching latest classdata.tpk from AssetRipper/Tpk..."
              $tpkTempDir = Join-Path $env:RUNNER_TEMP "tpk_$(Get-Random)"
              try {
                  $ghOutput = & gh run download -R AssetRipper/Tpk -n lz4_file -D $tpkTempDir 2>&1
                  if ($LASTEXITCODE -ne 0) { throw "gh run download failed: $ghOutput" }
                  $downloadedTpk = Join-Path $tpkTempDir 'lz4.tpk'
                  if (-not (Test-Path $downloadedTpk)) { throw "lz4.tpk not found in downloaded artifact" }
                  $targetTpk = "XUnityToolkit-WebUI\Resources\classdata.tpk"
                  $newHash = (Get-FileHash -Path $downloadedTpk -Algorithm SHA256).Hash
                  $changed = $true
                  if (Test-Path $targetTpk) {
                      $oldHash = (Get-FileHash -Path $targetTpk -Algorithm SHA256).Hash
                      if ($oldHash -eq $newHash) { $changed = $false }
                  }
                  if ($changed) {
                      Copy-Item -Path $downloadedTpk -Destination $targetTpk -Force
                      Write-Host "  [updated] classdata.tpk"
                  } else {
                      Write-Host "  [unchanged] classdata.tpk is up to date"
                  }
              } catch {
                  Write-Host "::warning::Failed to update classdata.tpk: $($_.Exception.Message)"
                  Write-Host "  Artifacts may have expired (90-day retention). Using committed version."
              } finally {
                  if (Test-Path $tpkTempDir) { Remove-Item $tpkTempDir -Recurse -Force -ErrorAction SilentlyContinue }
              }
          } else {
              Write-Host "  [skip] gh CLI not found, using committed classdata.tpk"
          }

          Write-Host "Bundled assets ready."

          # ── Wait for npm ci ──
          Write-Host "`n--- Waiting for npm ci ---"
          $npmCiJob | Wait-Job | Out-Null
          $npmCiOutput = Receive-Job $npmCiJob 2>&1
          if ($npmCiOutput) { $npmCiOutput | ForEach-Object { Write-Host $_ } }
          if ($npmCiJob.State -eq 'Failed') {
              $err = $npmCiJob.ChildJobs[0].JobStateInfo.Reason.Message
              Remove-Job $npmCiJob
              throw "npm ci failed: $err"
          }
          Remove-Job $npmCiJob
          Write-Host "npm ci complete."

      # ── Build frontend & TranslatorEndpoint (parallel) ──
      # Frontend runs in foreground (longest, shows progress live).
      # TranslatorEndpoint runs in background via Start-Job.
      # Updater AOT is a separate step — AOT needs native toolchain
      # which is unreliable inside Start-Job child processes.

      - name: Build frontend & TranslatorEndpoint
        shell: pwsh
        run: |
          $workDir = $PWD.Path

          # Start TranslatorEndpoint build in background (conditional on XUnity DLLs)
          $endpointJob = $null
          $hasLibs = (Test-Path "TranslatorEndpoint/libs/XUnity.AutoTranslator.Plugin.Core.dll") -and
                     (Test-Path "TranslatorEndpoint/libs/XUnity.Common.dll")
          if ($hasLibs) {
              $endpointJob = Start-Job -ScriptBlock {
                  param($dir)
                  Set-Location $dir
                  & dotnet build TranslatorEndpoint/TranslatorEndpoint.csproj -c Release --nologo -v quiet --no-restore 2>&1
                  if ($LASTEXITCODE -ne 0) { throw "TranslatorEndpoint build failed (exit code $LASTEXITCODE)" }
              } -ArgumentList $workDir
          } else {
              Write-Host "::warning::XUnity reference DLLs missing - LLMTranslate.dll will not be embedded."
          }

          # Build frontend in foreground (longest task, ~34s)
          Write-Host "::group::Frontend Build"
          Push-Location XUnityToolkit-Vue
          & npm run build
          $frontendExit = $LASTEXITCODE
          Pop-Location
          Write-Host "::endgroup::"

          if ($frontendExit -ne 0) {
              if ($endpointJob) { $endpointJob | Stop-Job -PassThru | Remove-Job -Force }
              throw "Frontend build failed"
          }
          Write-Host "Frontend build complete."

          # Collect TranslatorEndpoint results
          if ($endpointJob) {
              Write-Host "::group::TranslatorEndpoint Build"
              $endpointJob | Wait-Job | Out-Null
              try {
                  $endpointOutput = Receive-Job $endpointJob -ErrorAction Stop 2>&1
                  if ($endpointOutput) { $endpointOutput | ForEach-Object { Write-Host $_ } }
              } catch {
                  $endpointOutput = Receive-Job $endpointJob -ErrorAction SilentlyContinue 2>&1
                  if ($endpointOutput) { $endpointOutput | ForEach-Object { Write-Host $_ } }
              }
              if ($endpointJob.State -eq 'Failed') {
                  $err = $endpointJob.ChildJobs[0].JobStateInfo.Reason.Message
                  Remove-Job $endpointJob -Force
                  throw "TranslatorEndpoint build failed: $err"
              }
              Remove-Job $endpointJob -Force
              Write-Host "TranslatorEndpoint build complete."
              Write-Host "::endgroup::"
          }

      # ── Build Updater (AOT) ──
      # AOT publish requires its own restore phase to populate PrivateSdkAssemblies;
      # --no-restore breaks AOT. Runs as a dedicated step for clear error reporting.

      - name: Build Updater (AOT)
        shell: pwsh
        run: |
          dotnet publish Updater/Updater.csproj -c Release -r win-x64
          if ($LASTEXITCODE -ne 0) { throw "Updater AOT build failed" }

      # ── Publish backend ──

      - name: Publish all editions
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.build_version }}'
          $editions = @(
            @{ Name='full';     SC='true';  Suffix='';          Edition='full' },
            @{ Name='no-llama'; SC='true';  Suffix='-no-llama'; Edition='no-llama' },
            @{ Name='lite';     SC='false'; Suffix='-lite';     Edition='lite' }
          )

          foreach ($ed in $editions) {
            $outDir = "Release\win-x64$($ed.Suffix)"
            Write-Host "`n--- Publishing edition: $($ed.Name) ---"

            # Lite (framework-dependent) needs its own restore since --no-restore
            # was used with the self-contained restore earlier
            $restoreFlag = if ($ed.Name -eq 'lite') { '' } else { '--no-restore' }

            $publishArgs = @(
              'publish', 'XUnityToolkit-WebUI\XUnityToolkit-WebUI.csproj',
              '-c', 'Release',
              '-r', 'win-x64',
              "--self-contained", $ed.SC,
              '-p:DebugType=none',
              '-p:SkipFrontendBuild=true',
              "-p:InformationalVersion=$v",
              "-p:Edition=$($ed.Edition)",
              '-o', $outDir
            )
            if ($restoreFlag) { $publishArgs += $restoreFlag }

            & dotnet @publishArgs
            if ($LASTEXITCODE -ne 0) { throw "Publish failed for $($ed.Name)" }

            # Cleanup unnecessary files
            Get-ChildItem $outDir -Include 'web.config','*.pdb','*.staticwebassets.endpoints.json' -Recurse |
              Remove-Item -Force -ErrorAction SilentlyContinue

            # Copy bundled/ tree post-publish
            if (Test-Path "bundled") {
              $dest = Join-Path $outDir "bundled"
              if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
              Copy-Item -Path "bundled" -Destination $dest -Recurse -Force
              # Remove llama for non-full editions
              if ($ed.Name -ne 'full') {
                $llamaDest = Join-Path $dest "llama"
                if (Test-Path $llamaDest) { Remove-Item $llamaDest -Recurse -Force }
              }
            }

            # Copy Updater.exe
            $updaterExe = "Updater/bin/Release/net10.0/win-x64/publish/Updater.exe"
            if (Test-Path $updaterExe) {
              Copy-Item $updaterExe "$outDir/" -Force
            }

            $exeFile = Get-Item (Join-Path $outDir "XUnityToolkit-WebUI.exe")
            $sizeMB = [math]::Round($exeFile.Length / 1MB, 1)
            Write-Host "$($ed.Name) done (exe: $sizeMB MB)"
          }

      # ── Generate manifest & create all packages ──
      # Main release ZIP runs in a background job while component ZIPs are
      # created in the foreground. Component ZIPs use direct entry creation
      # (no temp directory copies) to reduce I/O.

      - name: Generate manifest & create packages
        shell: pwsh
        run: |
          $rid = "win-x64"
          $vPrefix = "${{ steps.ver.outputs.version_prefix }}"
          $version = "${{ steps.ver.outputs.build_version }}"
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $editions = @(
            @{ Name='full';     Suffix='';          ManifestRid='win-x64' },
            @{ Name='no-llama'; Suffix='-no-llama'; ManifestRid='win-x64-no-llama' },
            @{ Name='lite';     Suffix='-lite';     ManifestRid='win-x64-lite' }
          )

          # Start main ZIP jobs in background for all editions
          $mainZipJobs = @{}
          foreach ($ed in $editions) {
            $releaseDir = "Release/$rid$($ed.Suffix)"
            $releaseDirAbs = (Resolve-Path $releaseDir).Path
            $mainZipDst = Join-Path $PWD.Path "XUnityToolkit-WebUI-v$vPrefix-$rid$($ed.Suffix).zip"
            $mainZipJobs[$ed.Name] = Start-Job -ScriptBlock {
              param($src, $dst)
              Add-Type -AssemblyName System.IO.Compression.FileSystem
              if (Test-Path $dst) { Remove-Item $dst }
              [System.IO.Compression.ZipFile]::CreateFromDirectory($src, $dst)
            } -ArgumentList $releaseDirAbs, $mainZipDst
          }

          # ── Generate per-edition manifests and app ZIPs ──
          foreach ($ed in $editions) {
            $releaseDir = "Release/$rid$($ed.Suffix)"
            $releaseDirAbs = (Resolve-Path $releaseDir).Path

            $manifest = @{ version = $version; rid = $ed.ManifestRid; files = @{} }
            Get-ChildItem -Path $releaseDir -Recurse -File | ForEach-Object {
              $relativePath = $_.FullName.Substring($releaseDirAbs.Length + 1).Replace('\', '/')
              if ($relativePath -match '^data/' -or $relativePath -match '^appsettings') { return }
              $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLower()
              $package = if ($relativePath -match '^wwwroot/') { "wwwroot" }
                         elseif ($relativePath -match '^bundled/llama/') { "bundled-llama" }
                         elseif ($relativePath -match '^bundled/fonts/') { "bundled-fonts" }
                         elseif ($relativePath -match '^bundled/(bepinex5|bepinex6|xunity)/') { "bundled-plugins" }
                         elseif ($relativePath -match '^bundled/') { "bundled-misc" }
                         else { "app" }
              $manifest.files[$relativePath] = @{ hash = "sha256:$hash"; size = $_.Length; package = $package }
            }
            $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path "Release/manifest-$($ed.ManifestRid).json" -Encoding utf8
            Write-Host "Generated manifest-$($ed.ManifestRid).json"

            # Per-edition app ZIP (root-level files, exclude appsettings*)
            $appFiles = Get-ChildItem -Path $releaseDir -File | Where-Object { $_.Name -notmatch '^appsettings' }
            if ($appFiles) {
              $appZip = "Release/app-$($ed.ManifestRid).zip"
              if (Test-Path $appZip) { Remove-Item $appZip }
              $zip = [System.IO.Compression.ZipFile]::Open($appZip, 'Create')
              try {
                foreach ($f in $appFiles) {
                  [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $f.FullName, $f.Name) | Out-Null
                }
              } finally { $zip.Dispose() }
              Write-Host "Created app-$($ed.ManifestRid).zip"
            }
          }

          # ── Create shared component ZIPs (from full edition) ──
          $fullReleaseDir = "Release/$rid"

          # wwwroot ZIP
          $wwwrootDir = Join-Path $fullReleaseDir "wwwroot"
          if (Test-Path $wwwrootDir) {
            $wwwrootZip = "Release/wwwroot.zip"
            if (Test-Path $wwwrootZip) { Remove-Item $wwwrootZip }
            $zip = [System.IO.Compression.ZipFile]::Open($wwwrootZip, 'Create')
            try {
              $wwwBase = (Resolve-Path $wwwrootDir).Path
              Get-ChildItem -Path $wwwrootDir -Recurse -File | ForEach-Object {
                $entry = "wwwroot/" + $_.FullName.Substring($wwwBase.Length + 1).Replace('\', '/')
                [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $entry) | Out-Null
              }
            } finally { $zip.Dispose() }
            Write-Host "Created wwwroot.zip"
          }

          # bundled sub-component ZIPs
          $bundledDir = Join-Path $fullReleaseDir "bundled"
          if (Test-Path $bundledDir) {
            $bundledSubs = @(
              @{ Name = "bundled-llama";   Dirs = @("llama") },
              @{ Name = "bundled-fonts";   Dirs = @("fonts") },
              @{ Name = "bundled-plugins"; Dirs = @("bepinex5", "bepinex6", "xunity") }
            )
            foreach ($sub in $bundledSubs) {
              $zipPath = "Release/$($sub.Name).zip"
              if (Test-Path $zipPath) { Remove-Item $zipPath }
              $zip = [System.IO.Compression.ZipFile]::Open($zipPath, 'Create')
              try {
                foreach ($dirName in $sub.Dirs) {
                  $subDir = Join-Path $bundledDir $dirName
                  if (-not (Test-Path $subDir)) { continue }
                  $subBase = (Resolve-Path $subDir).Path
                  Get-ChildItem -Path $subDir -Recurse -File | ForEach-Object {
                    $entry = "bundled/$dirName/" + $_.FullName.Substring($subBase.Length + 1).Replace('\', '/')
                    [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $entry) | Out-Null
                  }
                }
              } finally { $zip.Dispose() }
              Write-Host "Created $($sub.Name).zip"
            }

            $miscFiles = Get-ChildItem -Path $bundledDir -File
            if ($miscFiles) {
              $miscZip = "Release/bundled-misc.zip"
              if (Test-Path $miscZip) { Remove-Item $miscZip }
              $zip = [System.IO.Compression.ZipFile]::Open($miscZip, 'Create')
              try {
                foreach ($f in $miscFiles) {
                  [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $f.FullName, "bundled/$($f.Name)") | Out-Null
                }
              } finally { $zip.Dispose() }
              Write-Host "Created bundled-misc.zip"
            }
          }

          # Generate update-check.json
          $ucAssets = [ordered]@{}
          Get-ChildItem -Path "Release" -File -Filter "*.json" | ForEach-Object { $ucAssets[$_.Name] = $_.Length }
          Get-ChildItem -Path "Release" -File -Filter "*.zip" | ForEach-Object { $ucAssets[$_.Name] = $_.Length }
          $updateCheck = [ordered]@{
            tag = ""; version = $version; changelog = ""; prerelease = $false; assets = $ucAssets
          }
          $updateCheck | ConvertTo-Json -Depth 3 | Set-Content -Path "Release/update-check.json" -Encoding utf8
          Write-Host "Generated update-check.json"

          # Wait for all main ZIP background jobs
          foreach ($ed in $editions) {
            $job = $mainZipJobs[$ed.Name]
            $job | Wait-Job | Out-Null
            $jobOutput = Receive-Job $job 2>&1
            if ($jobOutput) { $jobOutput | ForEach-Object { Write-Host $_ } }
            if ($job.State -eq 'Failed') {
              $err = $job.ChildJobs[0].JobStateInfo.Reason.Message
              Remove-Job $job -Force
              throw "Main ZIP creation failed for $($ed.Name): $err"
            }
            Remove-Job $job -Force
            $zipFile = "XUnityToolkit-WebUI-v$vPrefix-$rid$($ed.Suffix).zip"
            $zipSize = [math]::Round((Get-Item $zipFile).Length / 1MB, 1)
            Write-Host "Created $zipFile ($zipSize MB)"
          }

      # ── Build MSI installer ──

      - name: Build MSI (all editions)
        if: inputs.release_tag != ''
        shell: pwsh
        run: |
          $rid = "win-x64"
          $installerProject = "Installer/Installer.wixproj"
          $vPrefix = "${{ steps.ver.outputs.version_prefix }}"

          $parts = "${{ steps.ver.outputs.build_version }}".Split('.')
          $timestamp = $parts[2]
          $year = [int]$timestamp.Substring(0, 4)
          $month = [int]$timestamp.Substring(4, 2)
          $day = [int]$timestamp.Substring(6, 2)
          $hour = [int]$timestamp.Substring(8, 2)
          $minute = [int]$timestamp.Substring(10, 2)
          $msiMajor = ($year - 2024) * 12 + $month
          $msiMinor = $day
          $msiBuild = $hour * 60 + $minute
          $msiVersion = "$msiMajor.$msiMinor.$msiBuild"

          . ./Installer/Generate-InstallerWxs.ps1

          $editions = @(
            @{ Suffix='';          OutputDir="Release/$rid" },
            @{ Suffix='-no-llama'; OutputDir="Release/$rid-no-llama" },
            @{ Suffix='-lite';     OutputDir="Release/$rid-lite" }
          )

          foreach ($ed in $editions) {
            $edLabel = if ($ed.Suffix) { $ed.Suffix } else { 'full' }
            Write-Host "`n--- Building MSI for $edLabel ---"
            $generatedDir = "Installer/Generated"
            New-Item -ItemType Directory -Path $generatedDir -Force | Out-Null
            Generate-InstallerWxs -ReleaseDir $ed.OutputDir -OutputFile "$generatedDir/HarvestedFiles.wxs"

            # Clean bin/ AND obj/ to force full WiX rebuild per edition.
            # WiX SDK caches .wixobj, .cab, and MSI in obj/ — without cleaning,
            # incremental build reuses stale artifacts from the previous edition.
            $wixPlatform = 'x64'
            $wixBinDir = "Installer/bin/$wixPlatform/Release"
            $wixObjDir = "Installer/obj/$wixPlatform/Release"
            if (Test-Path $wixBinDir) { Remove-Item $wixBinDir -Recurse -Force }
            if (Test-Path $wixObjDir) { Remove-Item $wixObjDir -Recurse -Force }

            dotnet build $installerProject `
              -c Release `
              -p:Platform=$wixPlatform `
              -p:InstallerPlatform=$wixPlatform `
              -p:AppPublishDir="$($ed.OutputDir)/" `
              -p:MsiVersion="$msiVersion"

            if ($LASTEXITCODE -ne 0) { throw "MSI build failed for $edLabel" }

            $msiFile = Get-ChildItem "$wixBinDir/*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($msiFile) {
              $msiName = "XUnityToolkit-WebUI-v$vPrefix-$rid$($ed.Suffix).msi"
              $msiSize = [math]::Round($msiFile.Length / 1MB, 1)
              Move-Item $msiFile.FullName "Release/$msiName" -Force
              Write-Host "MSI built: Release/$msiName ($msiSize MB)"
            } else {
              throw "MSI output not found for $edLabel in $wixBinDir"
            }
          }

      # ── Upload artifacts ──

      - name: Upload release ZIPs
        uses: actions/upload-artifact@v7
        with:
          name: release-win-x64
          path: |
            XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64.zip
            XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64-no-llama.zip
            XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64-lite.zip
          retention-days: 3

      - name: Upload component packages artifact
        if: inputs.release_tag != ''
        uses: actions/upload-artifact@v7
        with:
          name: release-components
          path: |
            Release/manifest-win-x64.json
            Release/manifest-win-x64-no-llama.json
            Release/manifest-win-x64-lite.json
            Release/app-win-x64.zip
            Release/app-win-x64-no-llama.zip
            Release/app-win-x64-lite.zip
            Release/wwwroot.zip
            Release/bundled-llama.zip
            Release/bundled-fonts.zip
            Release/bundled-plugins.zip
            Release/bundled-misc.zip
            Release/update-check.json
            Release/XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64.msi
            Release/XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64-no-llama.msi
            Release/XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64-lite.msi
          retention-days: 3

  # ── Create GitHub Release ──
  release:
    needs: build
    if: ${{ inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-win-x64

      - name: Download component packages
        uses: actions/download-artifact@v8
        with:
          name: release-components
          path: components

      - name: Write release notes to file
        env:
          RELEASE_BODY: ${{ inputs.release_body }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          printf '%s' "$RELEASE_BODY" > release_notes.md

          # Append changelog from previous tag to current
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${RELEASE_TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (\`%h\`)" --no-merges)
            if [ -n "$CHANGELOG" ]; then
              printf '\n\n### Changelog\n%s\n' "$CHANGELOG" >> release_notes.md
            fi
          else
            # No previous tag — include all commits
            CHANGELOG=$(git log --pretty=format:"- %s (\`%h\`)" --no-merges -20)
            if [ -n "$CHANGELOG" ]; then
              printf '\n\n### Changelog\n%s\n' "$CHANGELOG" >> release_notes.md
            fi
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Guard against duplicate releases (e.g. dep-check retry after partial failure)
          if gh release view "${{ inputs.release_tag }}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release ${{ inputs.release_tag }} already exists, skipping."
            exit 0
          fi

          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          VER_PREFIX="${{ needs.build.outputs.version_prefix }}"
          gh release create "${{ inputs.release_tag }}" \
            "XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64.zip" \
            "XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64-no-llama.zip" \
            "XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64-lite.zip" \
            --title "${{ inputs.release_name }}" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG \
            --repo "${{ github.repository }}"

          echo "Release created: ${{ inputs.release_tag }}"

      - name: Upload component packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la components/
          gh release upload "${{ inputs.release_tag }}" \
            components/manifest-win-x64.json \
            components/manifest-win-x64-no-llama.json \
            components/manifest-win-x64-lite.json \
            components/app-win-x64.zip \
            components/app-win-x64-no-llama.zip \
            components/app-win-x64-lite.zip \
            components/wwwroot.zip \
            components/bundled-llama.zip \
            components/bundled-fonts.zip \
            components/bundled-plugins.zip \
            components/bundled-misc.zip \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Generate and upload update-check.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VER="${{ needs.build.outputs.build_version }}"
          TAG="${{ inputs.release_tag }}"
          PRERELEASE="${{ inputs.prerelease }}"

          CHANGELOG=""
          if [ -f release_notes.md ]; then
            CHANGELOG=$(awk '/^### Changelog/{found=1; next} /^## |^### /{if(found) exit} found{print}' release_notes.md | sed 's/^ *//' | sed '/^$/d')
          fi

          # Build assets JSON dynamically from all component files
          ASSETS_JSON="{}"
          for f in components/*.json components/*.zip; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            ASSETS_JSON=$(echo "$ASSETS_JSON" | jq --arg k "$NAME" --argjson v "$SIZE" '. + {($k): $v}')
          done

          jq -n \
            --arg tag "$TAG" \
            --arg version "$VER" \
            --arg changelog "$CHANGELOG" \
            --argjson prerelease "${PRERELEASE:-false}" \
            --argjson assets "$ASSETS_JSON" \
            '{
              tag: $tag,
              version: $version,
              changelog: $changelog,
              prerelease: $prerelease,
              assets: $assets
            }' > update-check.json

          gh release upload "${{ inputs.release_tag }}" update-check.json \
            --clobber --repo "${{ github.repository }}"
          echo "Uploaded update-check.json"

      - name: Upload MSI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER_PREFIX="${{ needs.build.outputs.version_prefix }}"
          for SUFFIX in "" "-no-llama" "-lite"; do
            MSI_FILE="components/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64${SUFFIX}.msi"
            if [ -f "$MSI_FILE" ]; then
              gh release upload "${{ inputs.release_tag }}" "$MSI_FILE" --clobber --repo "${{ github.repository }}"
              echo "Uploaded $(basename "$MSI_FILE")"
            fi
          done

      - name: Update README download links
        if: ${{ inputs.prerelease != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          VER_PREFIX="${{ needs.build.outputs.version_prefix }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Generate new download links table
          NEW_CONTENT="| 版本 | ZIP 便携版 | MSI 安装包 |
          |------|-----------|-----------|
          | **Full（完整版）** | [下载](${BASE}/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64.zip) | [下载](${BASE}/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64.msi) |
          | **No-LLAMA** | [下载](${BASE}/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64-no-llama.zip) | [下载](${BASE}/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64-no-llama.msi) |
          | **Lite（精简版）** | [下载](${BASE}/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64-lite.zip) | [下载](${BASE}/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64-lite.msi) |"

          # Remove leading whitespace from heredoc indentation
          NEW_CONTENT=$(echo "$NEW_CONTENT" | sed 's/^          //')

          # Replace content between markers using awk
          awk -v new="$NEW_CONTENT" '
            /<!-- DOWNLOAD_LINKS_START -->/ { print; printf "%s\n", new; skip=1; next }
            /<!-- DOWNLOAD_LINKS_END -->/ { skip=0 }
            !skip { print }
          ' README.md > README.tmp && mv README.tmp README.md

          # Switch to main branch (tag push leaves detached HEAD)
          git checkout main
          git pull --rebase origin main

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "ci: 更新 README 下载链接至 ${TAG}"
            git push
          fi
