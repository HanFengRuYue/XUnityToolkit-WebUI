# Reusable build workflow — called by release.yml and dep-check.yml
# Can also be triggered manually via workflow_dispatch for testing.
#
# Build orchestration is handled by MSBuild targets in the .csproj files:
#   - DownloadBundledAssets: downloads external dependencies (build/DownloadBundledAssets.targets)
#   - BuildFrontend: builds Vue frontend (XUnityToolkit-WebUI.csproj)
#   - TranslatorEndpoint: built via ProjectReference
#   - PublishUpdater: builds Updater AOT before publish
#   - PostPublishCleanup: copies bundled/, Updater.exe, removes junk
#
# CI-specific steps (manifest generation, component ZIPs, MSI, release) remain here.
name: Build

on:
  workflow_call:
    inputs:
      build_version:
        description: 'Version string (e.g. 1.9.202603130200); auto-generated if empty'
        required: false
        type: string
      release_tag:
        description: 'Git tag for the GitHub Release'
        required: true
        type: string
      release_name:
        description: 'Human-readable release title'
        required: true
        type: string
      release_body:
        description: 'Release notes markdown'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      build_version:
        description: 'Version override (default: auto-generated timestamp)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version_prefix: ${{ steps.ver.outputs.version_prefix }}
      build_version: ${{ steps.ver.outputs.build_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ inputs.build_version }}'
          if (-not $v) { $v = "3.7.$(Get-Date -Format 'yyyyMMddHHmm')" }
          $prefix = $v.Split('.')[0..1] -join '.'
          "build_version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version_prefix=$prefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Build version: $v (prefix: $prefix)"

      # ── SDK setup ──

      - name: Setup .NET 10 preview
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: XUnityToolkit-Vue/package-lock.json

      # ── Caching ──

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      # ── Parallel: npm ci + dotnet restore + download bundled assets ──
      # npm ci (~54s) runs in background while dotnet restore and
      # asset downloads proceed in the foreground (~32s combined).

      - name: Restore dependencies & download bundled assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Start npm ci in background (independent of everything else)
          $npmCiJob = Start-Job -ScriptBlock {
              param($workDir)
              Set-Location $workDir
              & npm ci 2>&1
              if ($LASTEXITCODE -ne 0) { throw "npm ci failed with exit code $LASTEXITCODE" }
          } -ArgumentList (Resolve-Path "XUnityToolkit-Vue").Path

          # Restore .NET projects
          Write-Host "Restoring .NET projects..."
          dotnet restore XUnityToolkit-WebUI/XUnityToolkit-WebUI.csproj -r win-x64 -v quiet
          dotnet restore Updater/Updater.csproj -r win-x64 -v quiet
          dotnet restore TranslatorEndpoint/TranslatorEndpoint.csproj -v quiet
          Write-Host ".NET restore complete."

          # Download bundled assets via MSBuild target
          Write-Host "Downloading bundled assets..."
          dotnet msbuild XUnityToolkit-WebUI/XUnityToolkit-WebUI.csproj -t:DownloadBundledAssets -p:SkipBundledDownload=false -v:minimal
          Write-Host "Bundled assets ready."

          # Wait for npm ci
          Write-Host "`n--- Waiting for npm ci ---"
          $npmCiJob | Wait-Job | Out-Null
          $npmCiOutput = Receive-Job $npmCiJob 2>&1
          if ($npmCiOutput) { $npmCiOutput | ForEach-Object { Write-Host $_ } }
          if ($npmCiJob.State -eq 'Failed') {
              $err = $npmCiJob.ChildJobs[0].JobStateInfo.Reason.Message
              Remove-Job $npmCiJob
              throw "npm ci failed: $err"
          }
          Remove-Job $npmCiJob
          Write-Host "npm ci complete."

      # ── Build frontend ──
      # npm ci already ran in background; now build the Vue frontend.

      - name: Build frontend
        shell: pwsh
        run: |
          Push-Location XUnityToolkit-Vue
          npm run build
          if ($LASTEXITCODE -ne 0) { throw "Frontend build failed" }
          Pop-Location
          Write-Host "Frontend build complete."

      # ── Publish (single command handles everything) ──
      # MSBuild targets handle: TranslatorEndpoint (ProjectReference), Updater AOT,
      # post-publish cleanup (copy bundled/, Updater.exe, delete junk).
      # Frontend + bundled downloads are skipped here (already done in prior steps).

      - name: Publish win-x64
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.build_version }}'
          dotnet publish XUnityToolkit-WebUI/XUnityToolkit-WebUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:DebugType=none `
            -p:SkipBundledDownload=true `
            -p:SkipFrontendBuild=true `
            -p:InformationalVersion=$v `
            -o "Release/win-x64"

          if ($LASTEXITCODE -ne 0) { throw "Publish failed for win-x64" }

          $exeFile = Get-Item "Release/win-x64/XUnityToolkit-WebUI.exe"
          $sizeMB = [math]::Round($exeFile.Length / 1MB, 1)
          Write-Host "win-x64 done (exe: $sizeMB MB)"

      # ── Generate manifest & create all packages ──
      # Main release ZIP runs in a background job while component ZIPs are
      # created in the foreground. Component ZIPs use direct entry creation
      # (no temp directory copies) to reduce I/O.

      - name: Generate manifest & create packages
        shell: pwsh
        run: |
          $rid = "win-x64"
          $releaseDir = "Release/$rid"
          $releaseDirAbs = (Resolve-Path $releaseDir).Path
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          # Start main release ZIP in background
          $vPrefix = "${{ steps.ver.outputs.version_prefix }}"
          $mainZipDst = Join-Path $PWD.Path "XUnityToolkit-WebUI-v$vPrefix-win-x64.zip"
          $mainZipJob = Start-Job -ScriptBlock {
              param($src, $dst)
              Add-Type -AssemblyName System.IO.Compression.FileSystem
              if (Test-Path $dst) { Remove-Item $dst }
              [System.IO.Compression.ZipFile]::CreateFromDirectory($src, $dst)
          } -ArgumentList $releaseDirAbs, $mainZipDst

          # ── Generate update manifest ──
          $version = "${{ steps.ver.outputs.build_version }}"
          $manifest = @{
              version = $version
              rid = $rid
              files = @{}
          }

          Get-ChildItem -Path $releaseDir -Recurse -File | ForEach-Object {
              $relativePath = $_.FullName.Substring($releaseDirAbs.Length + 1).Replace('\', '/')
              if ($relativePath -match '^data/' -or $relativePath -match '^appsettings') { return }
              $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLower()
              $package = if ($relativePath -match '^wwwroot/') { "wwwroot" }
                         elseif ($relativePath -match '^bundled/llama/') { "bundled-llama" }
                         elseif ($relativePath -match '^bundled/fonts/') { "bundled-fonts" }
                         elseif ($relativePath -match '^bundled/(bepinex5|bepinex6|xunity)/') { "bundled-plugins" }
                         elseif ($relativePath -match '^bundled/') { "bundled-misc" }
                         else { "app" }
              $manifest.files[$relativePath] = @{
                  hash = "sha256:$hash"
                  size = $_.Length
                  package = $package
              }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path "Release/manifest-$rid.json" -Encoding utf8
          Write-Host "Generated manifest."

          # Generate update-check.json for CDN-based update checks
          $ucAssets = [ordered]@{}
          @("manifest-$rid.json", "app-$rid.zip", "wwwroot.zip", "bundled-llama.zip", "bundled-fonts.zip", "bundled-plugins.zip", "bundled-misc.zip") | ForEach-Object {
            $p = "Release/$_"
            if (Test-Path $p) { $ucAssets[$_] = (Get-Item $p).Length }
          }
          $updateCheck = [ordered]@{
            tag = ""
            version = "${{ steps.ver.outputs.build_version }}"
            changelog = ""
            prerelease = $false
            assets = $ucAssets
          }
          $updateCheck | ConvertTo-Json -Depth 3 | Set-Content -Path "Release/update-check.json" -Encoding utf8
          Write-Host "Generated update-check.json"

          # ── Create component ZIPs ──

          # app ZIP — root-level files (exclude appsettings*)
          $appFiles = Get-ChildItem -Path $releaseDir -File | Where-Object { $_.Name -notmatch '^appsettings' }
          if ($appFiles) {
            $appZip = "Release/app-$rid.zip"
            if (Test-Path $appZip) { Remove-Item $appZip }
            $zip = [System.IO.Compression.ZipFile]::Open($appZip, 'Create')
            try {
              foreach ($f in $appFiles) {
                [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $f.FullName, $f.Name) | Out-Null
              }
            } finally { $zip.Dispose() }
            Write-Host "Created app-$rid.zip"
          }

          # wwwroot ZIP — direct entry creation with prefix (no temp directory copy)
          $wwwrootDir = Join-Path $releaseDir "wwwroot"
          if (Test-Path $wwwrootDir) {
            $wwwrootZip = "Release/wwwroot.zip"
            if (Test-Path $wwwrootZip) { Remove-Item $wwwrootZip }
            $zip = [System.IO.Compression.ZipFile]::Open($wwwrootZip, 'Create')
            try {
              $wwwBase = (Resolve-Path $wwwrootDir).Path
              Get-ChildItem -Path $wwwrootDir -Recurse -File | ForEach-Object {
                $entry = "wwwroot/" + $_.FullName.Substring($wwwBase.Length + 1).Replace('\', '/')
                [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $entry) | Out-Null
              }
            } finally { $zip.Dispose() }
            Write-Host "Created wwwroot.zip"
          }

          # bundled sub-component ZIPs (split to minimize update download size)
          $bundledDir = Join-Path $releaseDir "bundled"
          if (Test-Path $bundledDir) {
            $bundledSubs = @(
              @{ Name = "bundled-llama";   Dirs = @("llama") },
              @{ Name = "bundled-fonts";   Dirs = @("fonts") },
              @{ Name = "bundled-plugins"; Dirs = @("bepinex5", "bepinex6", "xunity") }
            )
            foreach ($sub in $bundledSubs) {
              $zipPath = "Release/$($sub.Name).zip"
              if (Test-Path $zipPath) { Remove-Item $zipPath }
              $zip = [System.IO.Compression.ZipFile]::Open($zipPath, 'Create')
              try {
                foreach ($dirName in $sub.Dirs) {
                  $subDir = Join-Path $bundledDir $dirName
                  if (-not (Test-Path $subDir)) { continue }
                  $subBase = (Resolve-Path $subDir).Path
                  Get-ChildItem -Path $subDir -Recurse -File | ForEach-Object {
                    $entry = "bundled/$dirName/" + $_.FullName.Substring($subBase.Length + 1).Replace('\', '/')
                    [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $entry) | Out-Null
                  }
                }
              } finally { $zip.Dispose() }
              Write-Host "Created $($sub.Name).zip"
            }

            # bundled-misc.zip — root-level files in bundled/ (e.g., script-tag-presets.json)
            $miscFiles = Get-ChildItem -Path $bundledDir -File
            if ($miscFiles) {
              $miscZip = "Release/bundled-misc.zip"
              if (Test-Path $miscZip) { Remove-Item $miscZip }
              $zip = [System.IO.Compression.ZipFile]::Open($miscZip, 'Create')
              try {
                foreach ($f in $miscFiles) {
                  [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $f.FullName, "bundled/$($f.Name)") | Out-Null
                }
              } finally { $zip.Dispose() }
              Write-Host "Created bundled-misc.zip"
            }
          }

          # Wait for main ZIP background job
          $mainZipJob | Wait-Job | Out-Null
          $mainZipOutput = Receive-Job $mainZipJob 2>&1
          if ($mainZipOutput) { $mainZipOutput | ForEach-Object { Write-Host $_ } }
          if ($mainZipJob.State -eq 'Failed') {
              $err = $mainZipJob.ChildJobs[0].JobStateInfo.Reason.Message
              Remove-Job $mainZipJob -Force
              throw "Main ZIP creation failed: $err"
          }
          Remove-Job $mainZipJob -Force

          $zipSize = [math]::Round((Get-Item "XUnityToolkit-WebUI-v$vPrefix-win-x64.zip").Length / 1MB, 1)
          Write-Host "Created XUnityToolkit-WebUI-v$vPrefix-win-x64.zip ($zipSize MB)"

      # ── Build MSI installer ──

      - name: Build MSI
        if: inputs.release_tag != ''
        shell: pwsh
        run: |
          $rid = "win-x64"
          $outputDir = "Release/$rid"
          $installerProject = "Installer/Installer.wixproj"

          # Generate MSI version from build version
          # Build version format: 3.7.YYYYMMDDHHmm
          # MSI constraints: major < 256, minor < 256, build < 65536
          $parts = "${{ steps.ver.outputs.build_version }}".Split('.')
          $timestamp = $parts[2]  # YYYYMMDDHHmm
          $year = [int]$timestamp.Substring(0, 4)
          $month = [int]$timestamp.Substring(4, 2)
          $day = [int]$timestamp.Substring(6, 2)
          $hour = [int]$timestamp.Substring(8, 2)
          $minute = [int]$timestamp.Substring(10, 2)
          $msiMajor = ($year - 2024) * 12 + $month
          $msiMinor = $day
          $msiBuild = $hour * 60 + $minute
          $msiVersion = "$msiMajor.$msiMinor.$msiBuild"

          # Source the shared harvesting function and generate file listing
          . ./Installer/Generate-InstallerWxs.ps1
          $generatedDir = "Installer/Generated"
          New-Item -ItemType Directory -Path $generatedDir -Force | Out-Null
          Generate-InstallerWxs -ReleaseDir $outputDir -OutputFile "$generatedDir/HarvestedFiles.wxs"

          $wixPlatform = 'x64'

          # Do NOT set OutputPath — it interferes with WiX file resolution
          dotnet build $installerProject `
            -c Release `
            -p:Platform=$wixPlatform `
            -p:InstallerPlatform=$wixPlatform `
            -p:AppPublishDir="$outputDir/" `
            -p:MsiVersion="$msiVersion"

          if ($LASTEXITCODE -ne 0) { throw "MSI build failed for $rid" }

          # Find MSI in WiX default output location
          $wixOutputDir = "Installer/bin/$wixPlatform/Release"
          $msiFile = Get-ChildItem "$wixOutputDir/*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msiFile) {
            $vPrefix = "${{ steps.ver.outputs.version_prefix }}"
            Move-Item $msiFile.FullName "Release/XUnityToolkit-WebUI-v$vPrefix-$rid.msi" -Force
            Write-Host "MSI built: Release/XUnityToolkit-WebUI-v$vPrefix-$rid.msi"
          }

      # ── Upload artifacts ──

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-win-x64
          path: XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64.zip
          retention-days: 3

      - name: Upload component packages artifact
        if: inputs.release_tag != ''
        uses: actions/upload-artifact@v5
        with:
          name: release-components
          path: |
            Release/manifest-win-x64.json
            Release/app-win-x64.zip
            Release/wwwroot.zip
            Release/bundled-llama.zip
            Release/bundled-fonts.zip
            Release/bundled-plugins.zip
            Release/bundled-misc.zip
            Release/update-check.json
            Release/XUnityToolkit-WebUI-v${{ steps.ver.outputs.version_prefix }}-win-x64.msi
          retention-days: 3

  # ── Create GitHub Release ──
  release:
    needs: build
    if: ${{ inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-win-x64

      - name: Download component packages
        uses: actions/download-artifact@v5
        with:
          name: release-components
          path: components

      - name: Write release notes to file
        env:
          RELEASE_BODY: ${{ inputs.release_body }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          printf '%s' "$RELEASE_BODY" > release_notes.md

          # Append changelog from previous tag to current
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${RELEASE_TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (\`%h\`)" --no-merges)
            if [ -n "$CHANGELOG" ]; then
              printf '\n\n### Changelog\n%s\n' "$CHANGELOG" >> release_notes.md
            fi
          else
            # No previous tag — include all commits
            CHANGELOG=$(git log --pretty=format:"- %s (\`%h\`)" --no-merges -20)
            if [ -n "$CHANGELOG" ]; then
              printf '\n\n### Changelog\n%s\n' "$CHANGELOG" >> release_notes.md
            fi
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Guard against duplicate releases (e.g. dep-check retry after partial failure)
          if gh release view "${{ inputs.release_tag }}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release ${{ inputs.release_tag }} already exists, skipping."
            exit 0
          fi

          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          VER_PREFIX="${{ needs.build.outputs.version_prefix }}"
          gh release create "${{ inputs.release_tag }}" \
            "XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64.zip" \
            --title "${{ inputs.release_name }}" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG \
            --repo "${{ github.repository }}"

          echo "Release created: ${{ inputs.release_tag }}"

      - name: Upload component packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # upload-artifact@v5 strips common path prefix (Release/)
          # so files are at components/xxx, not components/Release/xxx
          ls -la components/
          gh release upload "${{ inputs.release_tag }}" \
            components/manifest-win-x64.json \
            components/app-win-x64.zip \
            components/wwwroot.zip \
            components/bundled-llama.zip \
            components/bundled-fonts.zip \
            components/bundled-plugins.zip \
            components/bundled-misc.zip \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Generate and upload update-check.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VER="${{ needs.build.outputs.build_version }}"
          TAG="${{ inputs.release_tag }}"
          PRERELEASE="${{ inputs.prerelease }}"

          # Extract ### Changelog section from release notes
          CHANGELOG=""
          if [ -f release_notes.md ]; then
            CHANGELOG=$(awk '/^### Changelog/{found=1; next} /^## |^### /{if(found) exit} found{print}' release_notes.md | sed 's/^ *//' | sed '/^$/d')
          fi

          # Get component file sizes
          MANIFEST_SIZE=$(stat -c%s components/manifest-win-x64.json 2>/dev/null || echo 0)
          APP_SIZE=$(stat -c%s components/app-win-x64.zip 2>/dev/null || echo 0)
          WWWROOT_SIZE=$(stat -c%s components/wwwroot.zip 2>/dev/null || echo 0)
          LLAMA_SIZE=$(stat -c%s components/bundled-llama.zip 2>/dev/null || echo 0)
          FONTS_SIZE=$(stat -c%s components/bundled-fonts.zip 2>/dev/null || echo 0)
          PLUGINS_SIZE=$(stat -c%s components/bundled-plugins.zip 2>/dev/null || echo 0)
          MISC_SIZE=$(stat -c%s components/bundled-misc.zip 2>/dev/null || echo 0)

          # Build JSON (jq for proper escaping)
          jq -n \
            --arg tag "$TAG" \
            --arg version "$VER" \
            --arg changelog "$CHANGELOG" \
            --argjson prerelease "${PRERELEASE:-false}" \
            --argjson manifest_size "$MANIFEST_SIZE" \
            --argjson app_size "$APP_SIZE" \
            --argjson wwwroot_size "$WWWROOT_SIZE" \
            --argjson llama_size "$LLAMA_SIZE" \
            --argjson fonts_size "$FONTS_SIZE" \
            --argjson plugins_size "$PLUGINS_SIZE" \
            --argjson misc_size "$MISC_SIZE" \
            '{
              tag: $tag,
              version: $version,
              changelog: $changelog,
              prerelease: $prerelease,
              assets: {
                "manifest-win-x64.json": $manifest_size,
                "app-win-x64.zip": $app_size,
                "wwwroot.zip": $wwwroot_size,
                "bundled-llama.zip": $llama_size,
                "bundled-fonts.zip": $fonts_size,
                "bundled-plugins.zip": $plugins_size,
                "bundled-misc.zip": $misc_size
              }
            }' > update-check.json

          gh release upload "${{ inputs.release_tag }}" update-check.json \
            --clobber --repo "${{ github.repository }}"
          echo "Uploaded update-check.json"

      - name: Upload MSI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER_PREFIX="${{ needs.build.outputs.version_prefix }}"
          MSI_FILE="components/XUnityToolkit-WebUI-v${VER_PREFIX}-win-x64.msi"
          if [ -f "$MSI_FILE" ]; then
            gh release upload "${{ inputs.release_tag }}" "$MSI_FILE" --clobber --repo "${{ github.repository }}"
          fi
