# Triggered when a v* tag is pushed.
# Delegates all build work to build.yml.
name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    uses: ./.github/workflows/build.yml
    with:
      release_tag: ${{ github.ref_name }}
      release_name: "UnityLocalizationToolkit-WebUI ${{ github.ref_name }}"
      release_body: |
        ## UnityLocalizationToolkit-WebUI ${{ github.ref_name }}

        ### 版本说明
        - **Full（完整版）**：自带应用、本地 llama.cpp 运行时与常用资源，推荐大多数用户。
        - **No-LLAMA**：自带应用和翻译链路所需依赖，但不包含本地大模型运行时。
        - **Lite（精简版）**：体积最小，需要先安装 [.NET 10 Runtime](https://dotnet.microsoft.com/download/dotnet/10.0)。

        ### 下载

        #### ZIP 便携版（解压即用）
        | 文件 | 版本 |
        |------|------|
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64.zip` | Full（完整版） |
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-no-llama.zip` | No-LLAMA |
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-lite.zip` | Lite（精简版） |

        #### MSI 安装包（双击安装）
        | 文件 | 版本 |
        |------|------|
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64.msi` | Full（完整版） |
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-no-llama.msi` | No-LLAMA |
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-lite.msi` | Lite（精简版） |

        ### 安装方式
        - **便携版**：下载 ZIP，解压后运行 `UnityLocalizationToolkit-WebUI.exe`。
        - **安装包**：下载 MSI，按向导安装即可。
        - **Lite 版**：安装前请先准备 [.NET 10 Runtime](https://dotnet.microsoft.com/download/dotnet/10.0)。
      prerelease: false
    permissions:
      contents: write
