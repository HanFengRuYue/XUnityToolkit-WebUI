# Triggered when a v* tag is pushed.
# Delegates all build work to build.yml.
name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    uses: ./.github/workflows/build.yml
    with:
      release_tag: ${{ github.ref_name }}
      release_name: "XUnityToolkit-WebUI ${{ github.ref_name }}"
      release_body: |
        ## XUnityToolkit-WebUI ${{ github.ref_name }}

        ### 版本说明
        - **Full（完整版）**：自包含 + 内置本地大模型（推荐）
        - **No-LLAMA**：自包含，仅云端 API 翻译
        - **Lite（精简版）**：需安装 [.NET 10 运行时](https://dotnet.microsoft.com/download/dotnet/10.0)，最小体积

        ### 下载

        #### ZIP 便携版（解压即用）
        | 文件 | 版本 |
        |------|------|
        | `XUnityToolkit-WebUI-${{ github.ref_name }}-win-x64.zip` | Full 完整版 |
        | `XUnityToolkit-WebUI-${{ github.ref_name }}-win-x64-no-llama.zip` | No-LLAMA |
        | `XUnityToolkit-WebUI-${{ github.ref_name }}-win-x64-lite.zip` | Lite 精简版 |

        #### MSI 安装包（双击安装）
        | 文件 | 版本 |
        |------|------|
        | `XUnityToolkit-WebUI-${{ github.ref_name }}-win-x64.msi` | Full 完整版 |
        | `XUnityToolkit-WebUI-${{ github.ref_name }}-win-x64-no-llama.msi` | No-LLAMA |
        | `XUnityToolkit-WebUI-${{ github.ref_name }}-win-x64-lite.msi` | Lite 精简版 |

        ### 安装方式
        - **便携版：** 下载 ZIP，解压后运行 `XUnityToolkit-WebUI.exe`
        - **安装包：** 下载 MSI，双击安装即可
        - **Lite 版：** 需要先安装 [.NET 10 运行时](https://dotnet.microsoft.com/download/dotnet/10.0)
      prerelease: false
    permissions:
      contents: write
