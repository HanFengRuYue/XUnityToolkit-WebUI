# Triggered when a v* tag is pushed.
# Delegates all build work to build.yml.
name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    uses: ./.github/workflows/build.yml
    with:
      release_tag: ${{ github.ref_name }}
      release_name: "UnityLocalizationToolkit-WebUI ${{ github.ref_name }}"
      release_body: |
        ## UnityLocalizationToolkit-WebUI ${{ github.ref_name }}

        ### 鐗堟湰璇存槑
        - **Full锛堝畬鏁寸増锛?*锛氳嚜鍖呭惈 + 鍐呯疆鏈湴澶фā鍨嬶紙鎺ㄨ崘锛?
        - **No-LLAMA**锛氳嚜鍖呭惈锛屼粎浜戠 API 缈昏瘧
        - **Lite锛堢簿绠€鐗堬級**锛氶渶瀹夎 [.NET 10 杩愯鏃禲(https://dotnet.microsoft.com/download/dotnet/10.0)锛屾渶灏忎綋绉?

        ### 涓嬭浇

        #### ZIP 渚挎惡鐗堬紙瑙ｅ帇鍗崇敤锛?
        | 鏂囦欢 | 鐗堟湰 |
        |------|------|
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64.zip` | Full 瀹屾暣鐗?|
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-no-llama.zip` | No-LLAMA |
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-lite.zip` | Lite 绮剧畝鐗?|

        #### MSI 瀹夎鍖咃紙鍙屽嚮瀹夎锛?
        | 鏂囦欢 | 鐗堟湰 |
        |------|------|
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64.msi` | Full 瀹屾暣鐗?|
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-no-llama.msi` | No-LLAMA |
        | `UnityLocalizationToolkit-WebUI-${{ github.ref_name }}-win-x64-lite.msi` | Lite 绮剧畝鐗?|

        ### 瀹夎鏂瑰紡
        - **渚挎惡鐗堬細** 涓嬭浇 ZIP锛岃В鍘嬪悗杩愯 `UnityLocalizationToolkit-WebUI.exe`
        - **瀹夎鍖咃細** 涓嬭浇 MSI锛屽弻鍑诲畨瑁呭嵆鍙?
        - **Lite 鐗堬細** 闇€瑕佸厛瀹夎 [.NET 10 杩愯鏃禲(https://dotnet.microsoft.com/download/dotnet/10.0)
      prerelease: false
    permissions:
      contents: write
